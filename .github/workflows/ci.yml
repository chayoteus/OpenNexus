name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: go.sum

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: |
          go build -o messenger-server ./cmd/messenger

      - name: Vet
        run: go vet ./...

      - name: Run Go tests
        run: go test -v -race -cover ./...

      - name: Install Python client deps
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r clients/python/requirements.txt

      - name: Run Python client smoke tests
        run: |
          cd clients/python
          python3 -m unittest discover -s tests -p "test_*.py"
